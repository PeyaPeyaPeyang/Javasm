<p>
    このインスペクションは，クラスに宣言された完全修飾名が，ソースルート内での実際のファイルパスと一致しているかを確認します。
</p>
<p>
    クラスは次のような形式で宣言されることが想定されています。
</p>
<pre><code>
public class java/lang/ExampleClass {
}
    </code></pre>
<p>
    このインスペクションは，完全修飾名（たとえば <code>java/lang/ExampleClass</code>）がソースルート配下のファイルシステム上のパスと一致しているかを検証します。
    一致しない場合は，エラーとして強調表示されます。
</p>
</body>
</html>
